name: Analisar canal sem API

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: "URL, @handle ou nome do canal"
        required: true
        type: string

      max_videos:
        description: "Quantidade máxima de vídeos do canal principal"
        required: true
        default: "200"
        type: choice
        options:
          - "50"
          - "100"
          - "200"
          - "300"
          - "500"

      max_competitors:
        description: "Quantidade de canais de referência em inglês"
        required: true
        default: "3"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"
          - "4"

      deep_all:
        description: "Buscar dados detalhados de cada vídeo (mais demorado)"
        required: true
        default: false
        type: boolean

      skip_thumbnails:
        description: "Pular a análise visual das thumbnails"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: analisar-canal
  cancel-in-progress: false

jobs:
  analyze:
    name: Coletar e analisar canal
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CHANNEL_URL: ${{ inputs.channel_url }}
      MAX_VIDEOS: ${{ inputs.max_videos }}
      MAX_COMPETITORS: ${{ inputs.max_competitors }}
      DEEP_ALL: ${{ inputs.deep_all }}
      SKIP_THUMBNAILS: ${{ inputs.skip_thumbnails }}

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar testes, quando existirem
        shell: bash
        run: |
          if find tests -type f -name 'test_*.py' -print -quit 2>/dev/null | grep -q .; then
            python -m unittest discover -s tests -p 'test_*.py' -v
          else
            echo "Nenhum arquivo de teste encontrado. Continuando a análise."
          fi

      - name: Coletar e analisar
        shell: bash
        run: |
          args=(
            "$CHANNEL_URL"
            --max-videos "$MAX_VIDEOS"
            --max-competitors "$MAX_COMPETITORS"
            --output reports/latest.json
          )

          if [[ "$DEEP_ALL" == "true" ]]; then
            args+=(--deep-all)
          fi

          if [[ "$SKIP_THUMBNAILS" == "true" ]]; then
            args+=(--skip-thumbnails)
          fi

          python -m collector.collect "${args[@]}"

      - name: Conferir relatório gerado
        shell: bash
        run: |
          test -s reports/latest.json
          python -m json.tool reports/latest.json > /dev/null
          echo "Relatório gerado e validado com sucesso."

      - name: Salvar relatório no repositório
        shell: bash
        run: |
          git config user.name "youtube-strategy-bot"
          git config user.email "actions@users.noreply.github.com"

          git add reports/latest.json

          if git diff --cached --quiet; then
            echo "O relatório não mudou. Nenhum commit necessário."
            exit 0
          fi

          git commit -m "Atualiza análise do canal"
          git pull --rebase origin main
          git push origin HEAD:main
